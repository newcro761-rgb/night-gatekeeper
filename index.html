<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>야근왕 🌙</title>
<style>
  :root {
    --bg: #14161c;
    --card: #1e212b;
    --border: #2c3140;
    --text: #e8e9ed;
    --muted: #8b90a0;
    --accent: #f5b942;
    --danger: #e8607a;
    --ok: #4fd1a5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-bottom: 72px;
  }
  header {
    padding: 24px 20px 12px;
    text-align: center;
  }
  header h1 {
    font-size: 22px;
    margin: 0;
  }
  header p {
    color: var(--muted);
    font-size: 13px;
    margin: 4px 0 0;
  }
  .tab-content { display: none; padding: 12px 20px 20px; }
  .tab-content.active { display: block; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .gatekeeper-card { text-align: center; }
  .gatekeeper-card .crown { font-size: 40px; }
  .gatekeeper-card .name { font-size: 28px; font-weight: 700; margin: 8px 0; }
  .gatekeeper-card .pending { color: var(--muted); font-size: 15px; }
  .gatekeeper-card .no-records { color: var(--muted); font-size: 15px; }

  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #10121a;
    color: var(--text);
    font-size: 16px;
    margin-bottom: 14px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button.primary {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #1a1200;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  button.primary:active { opacity: 0.85; }
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: -6px;
    margin-bottom: 14px;
  }

  .history-list { list-style: none; margin: 0; padding: 0; }
  .history-list li {
    display: flex;
    justify-content: space-between;
    padding: 12px 4px;
    border-bottom: 1px solid var(--border);
  }
  .history-list li:last-child { border-bottom: none; }
  .history-list .date { color: var(--muted); font-size: 14px; }
  .history-list .name { font-weight: 600; }
  .empty { color: var(--muted); text-align: center; padding: 24px 0; font-size: 14px; }

  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    background: var(--card);
    border-top: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 14px 0;
    text-align: center;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
  }
  .tab-btn.active { color: var(--accent); font-weight: 700; }

  #toast {
    position: fixed;
    left: 50%;
    bottom: 90px;
    transform: translate(-50%, 20px);
    background: #2c3140;
    color: var(--text);
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s ease;
    max-width: 90%;
    text-align: center;
  }
  #toast.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🌙 야근왕</h1>
    <p>오늘의 문지기를 확인하세요</p>
  </header>

  <div id="tab-today" class="tab-content active">
    <div id="gatekeeper-card" class="card gatekeeper-card">
      <div class="pending">불러오는 중...</div>
    </div>

    <div class="card">
      <label for="input-name">이름</label>
      <input id="input-name" list="staff-names" placeholder="이름을 입력하세요" autocomplete="off">
      <datalist id="staff-names"></datalist>

      <label for="input-time">예상 퇴근시간</label>
      <input id="input-time" type="time">

      <button class="primary" id="btn-submit">기록하기</button>
      <div class="hint">같은 이름으로 다시 입력하면 시간이 수정됩니다 (휴가/조퇴 시 활용)</div>
    </div>
  </div>

  <div id="tab-history" class="tab-content">
    <div class="card">
      <ul class="history-list" id="history-list"></ul>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('today', this)">오늘</button>
  <button class="tab-btn" onclick="switchTab('history', this)">역대 문지기</button>
</div>

<div id="toast"></div>

<script src="common.js"></script>
<script>
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') loadHistory();
}

function loadNames() {
  apiGet('names').then(resp => {
    const datalist = document.getElementById('staff-names');
    datalist.innerHTML = '';
    (resp.names || []).forEach(n => {
      const opt = document.createElement('option');
      opt.value = n;
      datalist.appendChild(opt);
    });
  });
}

function renderGatekeeperCard(resp) {
  const card = document.getElementById('gatekeeper-card');
  if (resp.status === 'confirmed') {
    card.innerHTML = `<div class="crown">👑</div><div class="name">${escapeHtml(resp.gatekeeper)}</div>`;
  } else if (resp.status === 'no_records') {
    card.innerHTML = `<div class="no-records">오늘은 등록된 기록이 없습니다.</div>`;
  } else {
    card.innerHTML = `<div class="pending">오늘의 문지기는 ${escapeHtml(resp.confirm_at || '16:00')}에 확정됩니다</div>`;
  }
}

function loadToday() {
  apiGet('today').then(renderGatekeeperCard);
}

function loadHistory() {
  apiGet('history').then(resp => {
    const list = document.getElementById('history-list');
    const items = resp.history || [];
    if (items.length === 0) {
      list.innerHTML = '<div class="empty">아직 기록된 문지기가 없습니다.</div>';
      return;
    }
    list.innerHTML = items.map(h =>
      `<li><span class="date">${escapeHtml(h.date)}</span><span class="name">${escapeHtml(h.gatekeeper)}</span></li>`
    ).join('');
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

document.getElementById('btn-submit').addEventListener('click', () => {
  const name = document.getElementById('input-name').value.trim();
  const leaveTime = document.getElementById('input-time').value;
  if (!name || !leaveTime) {
    showToast('이름과 퇴근시간을 모두 입력해 주세요.');
    return;
  }
  apiPost('submit', { name, leave_time: leaveTime }).then(resp => {
    if (resp.result === 'OK') {
      showToast('기록되었습니다.');
      loadToday();
    } else if (resp.result === 'NAME_NOT_FOUND') {
      showToast('명단에 없는 이름입니다. 관리자에게 문의하세요.');
    } else if (resp.result === 'INVALID_TIME_FORMAT') {
      showToast('시간 형식이 올바르지 않습니다.');
    } else if (resp.result !== 'BUSY') {
      showToast('기록에 실패했습니다. 다시 시도해 주세요.');
    }
  });
});

loadNames();
loadToday();
</script>
</body>
</html>
